name: Crawl Job Boards

on:
  schedule:
      - cron: '0 23 * * 4'  # Every Thursday at 23:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run crawler
        run: python crawl.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🦀 crawl: $(date -u +%Y-%m-%d)"
            BRANCH_NAME="crawl/$(date -u +%Y-%m-%d)"
            git checkout -b "$BRANCH_NAME"
            git push origin "$BRANCH_NAME"
            
            gh pr create \
              --title "🦀 crawl: $(date -u +%Y-%m-%d)" \
              --body "Automated job board crawl" \
              --base main
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}